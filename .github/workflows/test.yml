name: Test Dokku DNS Plugin

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  docker-integration-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install docker-compose-plugin
        
    - name: Run Docker integration tests
      run: |
        chmod +x ./test-docker.sh
        ./test-docker.sh --build
      
    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: docker-test-logs
        path: |
          *.log
          docker-compose.*.yml
        retention-days: 7

  bats-unit-tests:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install docker-compose-plugin
        
    - name: Run BATS unit tests
      run: |
        chmod +x ./test-bats.sh
        ./test-bats.sh
      
    - name: Upload BATS test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bats-test-results
        path: |
          tmp/test-results/
          *.log
        retention-days: 7

  shellcheck-linting:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install shellcheck
      
    - name: Run ShellCheck
      run: |
        make lint || echo "Linting completed with warnings"
      
    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: shellcheck-results
        path: |
          tmp/test-results/shellcheck/
        retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [docker-integration-tests, bats-unit-tests, shellcheck-linting]
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ needs.docker-integration-tests.result }}" == "success" ]]; then
          echo "✅ Docker Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Docker Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.bats-unit-tests.result }}" == "success" ]]; then
          echo "✅ BATS Unit Tests: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ BATS Unit Tests: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.shellcheck-linting.result }}" == "success" ]]; then
          echo "✅ ShellCheck Linting: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ ShellCheck Linting: WARNINGS" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Testing Infrastructure:**" >> $GITHUB_STEP_SUMMARY
        echo "- Docker integration tests verify full plugin functionality" >> $GITHUB_STEP_SUMMARY
        echo "- BATS unit tests provide fast feedback on core commands" >> $GITHUB_STEP_SUMMARY
        echo "- ShellCheck ensures code quality and best practices" >> $GITHUB_STEP_SUMMARY