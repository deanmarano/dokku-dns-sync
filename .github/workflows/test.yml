name: Docker Integration Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  docker-integration-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
        docker-compose --version
        
    - name: Run Docker integration tests
      run: |
        chmod +x ./test-docker.sh
        ./test-docker.sh --build
      
    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: docker-test-logs
        path: |
          *.log
          docker-compose.*.yml
        retention-days: 7


  test-summary:
    name: Integration Test Summary
    runs-on: ubuntu-latest
    needs: [docker-integration-tests]
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## Docker Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ needs.docker-integration-tests.result }}" == "success" ]]; then
          echo "✅ Docker Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Docker Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Integration Testing:**" >> $GITHUB_STEP_SUMMARY
        echo "- Tests full plugin functionality in containerized Dokku environment" >> $GITHUB_STEP_SUMMARY
        echo "- Complements unit tests in CI workflow for complete coverage" >> $GITHUB_STEP_SUMMARY